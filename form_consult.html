<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Оставить заявку | DataEdge AI</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #ffffff 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* карточка формы */
        .form-card {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 36px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            padding: 40px 36px 48px;
            border: 1px solid #eef2f6;
            transition: transform 0.2s ease;
        }

        /* кнопка назад */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 28px;
            transition: color 0.2s;
        }
        .back-link i {
            font-size: 0.9rem;
            transition: transform 0.2s;
        }
        .back-link:hover {
            color: #1e2a5e;
        }
        .back-link:hover i {
            transform: translateX(-3px);
        }

        /* заголовок */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #1E2A5E, #2D3A6E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            color: #475569;
            margin-bottom: 32px;
            border-left: 3px solid #3b82f6;
            padding-left: 14px;
            font-weight: 400;
        }

        /* поля формы */
        .input-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #0f172a;
            font-size: 0.9rem;
        }
        label i {
            color: #2563eb;
            width: 24px;
            margin-right: 6px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
            color: #0f172a;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* кнопка отправки */
        .submit-btn {
            width: 100%;
            background: #1e2a5e;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .submit-btn:hover {
            background: #0f1a44;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }

        /* примечание и контакт */
        .note {
            margin-top: 28px;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
            border-top: 1px solid #edf2f7;
            padding-top: 24px;
        }
        .note a {
            color: #2563eb;
            text-decoration: none;
        }
        .success-message {
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            padding: 16px;
            border-radius: 20px;
            margin-top: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        .error-message {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            padding: 12px;
            border-radius: 20px;
            margin-top: 16px;
            display: none;
            font-size: 0.85rem;
            color: #991b1b;
        }
        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        @media (max-width: 500px) {
            .form-card {
                padding: 28px 20px 36px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="form-card">
        <!-- Кнопка "Вернуться назад" -->
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Вернуться назад
        </a>

        <h1>Оставить заявку</h1>
        <div class="sub">Заполните форму — мы свяжемся с вами в ближайшее время</div>

        <form id="requestForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> ФИО</label>
                <input type="text" id="fullname" name="fullname" placeholder="Иванов Иван Иванович" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-phone-alt"></i> Телефон</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (___) ___-__-__" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Электронная почта</label>
                <input type="email" id="email" name="email" placeholder="ivan@example.com" required>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> Отправить данные
            </button>
        </form>

        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle" style="font-size: 1.4rem; color:#0284c7;"></i>
            <span>Спасибо! Ваша заявка принята. Наш менеджер свяжется с вами в течение часа.</span>
        </div>
        <div id="errorMessage" class="error-message"></div>

        <div class="note">
            <i class="fas fa-lock"></i> Ваши данные защищены. Нажимая «Отправить данные», вы соглашаетесь с <a href="#">политикой обработки данных</a>.
        </div>
        <footer>
            DataEdge AI — аналитика и ИИ агенты
        </footer>
    </div>

    <script>
        (function() {
            const form = document.getElementById('requestForm');
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');

            // Функция валидации телефона (простая, но понятная)
            function validatePhone(phone) {
                const digits = phone.replace(/[\s\-\(\)\+]/g, '');
                const phoneRegex = /^[0-9]{10,15}$/; // минимум 10 цифр
                return phoneRegex.test(digits);
            }

            function validateEmail(email) {
                return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
            }

            function validateFullname(name) {
                return name.trim().length >= 2;
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // Скрываем старые сообщения
                successDiv.style.display = 'none';
                errorDiv.style.display = 'none';
                errorDiv.innerHTML = '';

                const fullname = document.getElementById('fullname').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const email = document.getElementById('email').value.trim();

                let errors = [];

                if (!validateFullname(fullname)) {
                    errors.push('• Укажите корректное ФИО (не менее 2 символов)');
                }
                if (!validatePhone(phone)) {
                    errors.push('• Введите корректный номер телефона (не менее 10 цифр)');
                }
                if (!validateEmail(email)) {
                    errors.push('• Введите корректный email (например, name@domain.ru)');
                }

                if (errors.length > 0) {
                    errorDiv.innerHTML = errors.join('<br>');
                    errorDiv.style.display = 'block';
                    return;
                }

                // Имитация отправки данных (в реальности здесь был бы fetch)
                // Просто показываем успех через 400 мс, имитируя сетевой запрос
                const btn = form.querySelector('.submit-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отправка...';
                btn.disabled = true;

                setTimeout(() => {
                    // Успешная отправка (демо-режим, без реального бэкенда)
                    successDiv.style.display = 'flex';
                    form.reset();   // очищаем поля
                    btn.innerHTML = originalText;
                    btn.disabled = false;

                    // Дополнительно можно вывести в консоль (для отладки)
                    console.log('Заявка отправлена (демо):', { fullname, phone, email });
                    
                    // Скрыть сообщение об успехе через 6 секунд
                    setTimeout(() => {
                        successDiv.style.display = 'none';
                    }, 6000);
                }, 800);
            });
        })();
    </script>
</body>
</html>
