<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявка на консультацию</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f7f6; }
        form { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #002D72; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #001a45; }
    </style>
</head>
<body>
    <form>
        <h2>Оставить заявку</h2>
        <input type="text" placeholder="ФИО" required>
        <input type="tel" placeholder="Телефон" required>
        <input type="email" placeholder="Электронная почта" required>
        <button type="submit">Отправить данные</button>
        <br><br>
        <a href="index.html">← Вернуться назад</a>
    </form>
</body>
</html>
